<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScan IA - Calculadora de Calories</title>
    <!-- Tailwind CSS per a disseny modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome per a icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --emerald-primary: #059669;
            --emerald-dark: #064e3b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Fons degradat que no és blanc per defecte */
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #a7f3d0 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--emerald-primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Estils personalitzats per al botó de pujada */
        .custom-file-upload {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-file-upload:hover {
            border-color: var(--emerald-primary);
            background-color: rgba(16, 185, 129, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-[2.5rem] shadow-2xl overflow-hidden">
        <!-- Capçalera amb degradat -->
        <div class="bg-gradient-to-r from-emerald-600 to-teal-700 p-8 text-white text-center shadow-lg">
            <div class="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/30">
                <i class="fa-solid fa-utensils text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-1">NutriScan IA</h1>
            <p class="text-emerald-100 text-sm font-medium opacity-90">Anàlisi nutricional intel·ligent</p>
        </div>

        <div class="p-8 space-y-6">
            <!-- Pas 1: Foto -->
            <div class="space-y-3">
                <div class="flex items-center justify-between ml-1">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">1. Puja la foto</label>
                    <span id="file-name" class="text-[10px] text-emerald-600 font-semibold truncate max-w-[150px]"> Cap fitxer</span>
                </div>
                
                <div class="relative group">
                    <input type="file" id="fotoInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="previewImage(event)">
                    <div id="dropzone" class="custom-file-upload border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center">
                        <div id="uploadPrompt">
                            <i class="fa-solid fa-camera-retro text-3xl text-emerald-500 mb-3 opacity-80 group-hover:scale-110 transition-transform"></i>
                            <p class="text-sm font-bold text-gray-700">Tria una foto del plat</p>
                            <p class="text-xs text-gray-400 mt-1">Clica aquí per obrir la galeria</p>
                        </div>
                        <div id="previewContainer" class="hidden animate-in fade-in zoom-in duration-300">
                            <img id="imagePreview" class="mx-auto h-44 object-cover rounded-xl shadow-lg border-2 border-white">
                            <p class="text-[10px] text-emerald-600 mt-3 font-bold uppercase tracking-tighter">Imatge carregada correctament</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pas 2: Text -->
            <div class="space-y-3">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">2. Detalls del menjar</label>
                <div class="relative">
                    <i class="fa-solid fa-pen-to-square absolute left-4 top-4 text-emerald-500/50"></i>
                    <textarea id="descripcio" rows="3" class="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all resize-none text-gray-700 placeholder-gray-400 text-sm" placeholder="Ex: 200g d'arròs amb pollastre i alvocat..."></textarea>
                </div>
            </div>

            <!-- Botó Principal -->
            <button onclick="processar()" id="btnAction" class="group w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-emerald-200/50 hover:bg-emerald-700 transform active:scale-95 transition-all flex items-center justify-center gap-3">
                <span>Calcular Calories</span>
                <i class="fa-solid fa-wand-sparkles group-hover:rotate-12 transition-transform"></i>
            </button>

            <!-- Estat de Càrrega -->
            <div id="loading" class="hidden text-center py-4 bg-emerald-50 rounded-2xl border border-emerald-100 animate-pulse">
                <div class="loader mr-2"></div>
                <span class="text-sm font-bold text-emerald-700">L'IA està analitzant el teu plat...</span>
            </div>

            <!-- Resultat Final -->
            <div id="resultat" class="hidden bg-slate-900 rounded-[2rem] p-7 text-white shadow-2xl transition-all duration-700 translate-y-4">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-[0.2em]">Estimació Nutricional</p>
                        <h2 id="valCal" class="text-5xl font-black mt-1">-- <span class="text-xl font-normal text-gray-400">kcal</span></h2>
                    </div>
                    <div class="bg-emerald-500/20 p-3 rounded-2xl">
                        <i class="fa-solid fa-fire-flame-curved text-emerald-400 text-xl"></i>
                    </div>
                </div>
                
                <div class="space-y-4 border-t border-white/10 pt-5" id="macros">
                    <!-- Es genera dinàmicament -->
                </div>

                <div class="mt-6 pt-4 border-t border-white/5">
                    <button onclick="resetApp()" class="w-full py-2 text-xs font-bold text-gray-400 hover:text-emerald-400 transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-rotate-left"></i>
                        Nova consulta
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="p-6 text-center">
            <p class="text-[10px] text-gray-400 font-medium">© 2024 NutriScan AI - Desenvolupat amb Intel·ligència Artificial</p>
        </div>
    </div>

    <script>
        // Funció per previsualitzar la imatge pujada
        function previewImage(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            
            if (file) {
                document.getElementById('file-name').innerText = " " + file.name;
                reader.onload = function() {
                    const preview = document.getElementById('imagePreview');
                    preview.src = reader.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // Funció principal de processament
        function processar() {
            const desc = document.getElementById('descripcio').value.trim();
            const foto = document.getElementById('fotoInput').files[0];

            if(!desc) {
                showToast("Si us plau, descriu els ingredients.");
                return;
            }

            const btn = document.getElementById('btnAction');
            const loading = document.getElementById('loading');
            const result = document.getElementById('resultat');

            // Interfície en mode càrrega
            btn.classList.add('hidden');
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            // Simulació de "pensament" de l'IA (normalment aquí cridaríem a una API)
            setTimeout(() => {
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                result.classList.remove('translate-y-4');
                
                // Lògica de simulació realista
                const calBase = Math.floor(Math.random() * (600 - 200) + 200);
                
                document.getElementById('valCal').innerHTML = `${calBase} <span class="text-xl font-normal text-gray-400">kcal</span>`;
                
                document.getElementById('macros').innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">Proteïnes</span>
                        <div class="flex items-center gap-3">
                            <div class="w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                <div class="bg-blue-400 h-full" style="width: 70%"></div>
                            </div>
                            <span class="font-mono text-blue-400 w-8 text-right">${Math.floor(calBase/18)}g</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">Carbohidrats</span>
                        <div class="flex items-center gap-3">
                            <div class="w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                <div class="bg-emerald-400 h-full" style="width: 45%"></div>
                            </div>
                            <span class="font-mono text-emerald-400 w-8 text-right">${Math.floor(calBase/12)}g</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">Greixos</span>
                        <div class="flex items-center gap-3">
                            <div class="w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                <div class="bg-orange-400 h-full" style="width: 30%"></div>
                            </div>
                            <span class="font-mono text-orange-400 w-8 text-right">${Math.floor(calBase/35)}g</span>
                        </div>
                    </div>
                `;
            }, 2000);
        }

        // Funció simple per a avisos
        function showToast(msg) {
            alert(msg); // En una versió real usaríem un element HTML flotant
        }

        // Funció per reiniciar l'aplicació
        function resetApp() {
            const result = document.getElementById('resultat');
            result.classList.add('translate-y-4');
            
            setTimeout(() => {
                document.getElementById('descripcio').value = '';
                document.getElementById('fotoInput').value = '';
                document.getElementById('previewContainer').classList.add('hidden');
                document.getElementById('uploadPrompt').classList.remove('hidden');
                document.getElementById('resultat').classList.add('hidden');
                document.getElementById('btnAction').classList.remove('hidden');
                document.getElementById('file-name').innerText = " Cap fitxer";
            }, 300);
        }
    </script>
</body>
</html>
